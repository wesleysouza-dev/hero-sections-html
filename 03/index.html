<!doctype html>
<html lang="pt-BR">
  <head>
    <base href="/03/" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neymar Hero Section</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="hero" aria-label="Hero Neymar">
      <div class="hero__glow hero__glow--left"></div>
      <div class="hero__glow hero__glow--right"></div>

      <header class="nav fade-up">
        <a class="nav__brand" href="#" aria-label="CBF">
          <img src="images/logo-cbf.svg" alt="CBF" />
        </a>

        <nav class="nav__links" id="main-menu" aria-label="Navegacao principal">
          <a href="#">Sobre</a>
          <a href="#">Gols</a>
          <a href="#">Noticias</a>
          <a href="#">Partidas</a>
        </nav>

        <div class="nav__actions">
          <button aria-label="Buscar">
            <i data-feather="search"></i>
          </button>
          <button aria-label="Compartilhar">
            <i data-feather="share-2"></i>
          </button>
        </div>

        <button
          class="nav__toggle"
          type="button"
          aria-label="Abrir menu"
          aria-expanded="false"
          aria-controls="main-menu"
        >
          <i data-feather="menu"></i>
        </button>
      </header>

      <section class="hero__content">
        <div class="hero__badge fade-up" aria-label="Brasil">
          <img src="images/logo-brasil.svg" alt="" />
        </div>

        <h2 class="hero__back-title" data-split>O REI VOLTOU</h2>

        <div class="hero__side-copy fade-up">
          <strong>01.</strong>
          <span>Atacante<br />Brasileiro</span>
          <small></small>
          <a href="#">Learn more</a>
        </div>

        <figure class="hero__player">
          <img
            src="images/neymar-hero.webp"
            alt="Neymar com camisa da selecao brasileira"
          />
        </figure>

        <div class="hero__title-wrap">
          <h1 class="hero__title" aria-label="Neymar" data-title>Neymar</h1>
          <p class="hero__subtitle fade-up">
            O craque da selecao brasileira, lider e icone do futebol arte.
          </p>
        </div>

        <a class="video-card fade-up" href="#" aria-label="Assistir video">
          <img src="images/thumb-video.jpg" alt="Neymar em campo" />
          <span></span>
        </a>

        <div class="stats fade-up">
          <article>
            <span>Idade:</span>
            <strong>34 anos</strong>
          </article>
          <article>
            <span>Altura:</span>
            <strong>1.75 m</strong>
          </article>
          <article>
            <span>Gols pela selecao:</span>
            <strong>79</strong>
          </article>
          <article>
            <span>Partidas pela selecao:</span>
            <strong>128</strong>
          </article>
          <article>
            <span>Clube atual:</span>
            <strong class="text-santos">Santos</strong>
            <img src="images/logo-santos.svg" alt="Santos" class="img-santos" />
          </article>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
